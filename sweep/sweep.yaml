program: src/train.py
method: random

# Add this block to avoid W&B parsing issue
command:
  - ${env}
  - python
  - ${program}
  - --model_name=${model_name}
  - --dataset=${dataset}
  - --max_length=${max_length}
  - --learning_rate=${learning_rate}
  - --weight_decay=${weight_decay}
  - --num_train_epochs=${num_train_epochs}
  - --per_device_train_batch_size=${per_device_train_batch_size}
  - --per_device_eval_batch_size=${per_device_eval_batch_size}
  - --warmup_ratio=${warmup_ratio}
  - --logging_steps=${logging_steps}
  - --eval_strategy=${eval_strategy}
  - --eval_steps=${eval_steps}
  - --save_strategy=${save_strategy}
  - --save_steps=${save_steps}
  - --seed=${seed}
  - --hidden_dropout=${hidden_dropout}
  - --attention_dropout=${attention_dropout}
  - --run_name=${run_name}

metric:
  name: eval/f1
  goal: maximize

parameters:
  model_name:
    value: "dmis-lab/biobert-base-cased-v1.1"

  dataset:
    value: "bc5cdr"

  max_length:
    values: [128, 256, 512]

  learning_rate:
    values: [2e-5, 3e-5, 5e-5]

  weight_decay:
    values: [0.0, 0.1, 0.01, 0.001, 0.0001]

  num_train_epochs:
    values: [3, 4, 5, 6, 8]

  per_device_train_batch_size:
    values: [8, 16, 32]

  per_device_eval_batch_size:
    value: 16

  warmup_ratio:
    values: [0.0, 0.1]

  logging_steps:
    value: 50

  eval_strategy:
    value: "epoch"

  eval_steps:
    value: 500

  save_strategy:
    value: "epoch"

  save_steps:
    value: 500

  seed:
    value: 42

  hidden_dropout:
    values: [0.1, 0.2, 0.3]

  attention_dropout:
    values: [0.1, 0.2, 0.3]

  run_name:
    value: "sweep"
